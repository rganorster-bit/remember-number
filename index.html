<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משימת מספרים</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff7d6;
  text-align:center;
  padding:16px;
}

h1{
  font-size:34px;
  color:#d6a400;
}

.instructions{
  background:white;
  padding:16px;
  border-radius:18px;
  border:3px solid #111;
  font-size:19px;
  line-height:1.6;
}

.board{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  max-width:430px;
  margin:20px auto;
  background:white;
  padding:14px;
  border-radius:20px;
  border:4px solid #111;
}

.num{
  font-size:30px;
  font-weight:bold;
  padding:18px 6px;
  border:3px solid #111;
  border-radius:14px;
  background:#fff;
}
</style>
</head>

<body>

<h1>🔢 משימת המספרים</h1>

<div class="instructions">
  <b>איך משחקים?</b><br><br>
  סרקו את הברקוד והניחו את הנייד רחוק מהקבוצות.<br>
  בספירת <b>"צא!"</b> נציג ראשון מכל קבוצה רץ אל המספרים, משנן כמה שניתן וחוזר.<br>
  הנציג רושם על הדף את המספרים שזכר, ורק אז הנציג הבא רשאי לרוץ.<br><br>
  🏆 הקבוצה הראשונה שמעתיקה נכון את כל 12 המספרים — מנצחת!
</div>

<div class="board" id="board"></div>

<script>
const boards = [
  [247, 583, 914, 368, 725, 491, 836, 152, 679, 248, 915, 734],
  [318, 642, 759, 184, 526, 973, 407, 861, 295, 630, 748, 519],
  [135, 246, 357, 468, 579, 680, 791, 802, 913, 124, 235, 346],
  [902, 417, 638, 159, 724, 385, 846, 271, 593, 760, 128, 439],
  [111, 222, 333, 444, 555, 666, 777, 888, 999, 123, 456, 789],
  [214, 389, 572, 846, 135, 697, 420, 753, 981, 268, 504, 319],
  [609, 718, 827, 936, 145, 254, 363, 472, 581, 690, 809, 918],
  [321, 654, 987, 210, 543, 876, 109, 432, 765, 198, 531, 864],
  [147, 258, 369, 480, 591, 602, 713, 824, 935, 146, 257, 368],
  [731, 284, 695, 148, 562, 973, 306, 817, 429, 650, 781, 234]
];

function showRandomBoard(){
  const randomIndex = Math.floor(Math.random() * boards.length);
  const selectedBoard = boards[randomIndex];
  const board = document.getElementById("board");

  selectedBoard.forEach(num => {
    const div = document.createElement("div");
    div.className = "num";
    div.innerText = num;
    board.appendChild(div);
  });
}

showRandomBoard();
</script>

</body>
</html>
